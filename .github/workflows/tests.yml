name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app

      - name: Run tests
        run: |
          xcodebuild test \
            -project Alias.xcodeproj \
            -scheme Alias \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.5' \
            -only-testing:AliasTests
