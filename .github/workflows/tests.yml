name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: |
          XCODE_PATH="$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Run tests
        run: |
          xcodebuild test \
            -project Alias.xcodeproj \
            -scheme Alias \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -only-testing:AliasTests
